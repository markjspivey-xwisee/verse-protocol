name: World Builder Agent

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_proposals:
        description: 'Maximum proposals to create'
        default: '2'

permissions:
  contents: write

jobs:
  build-world:
    runs-on: ubuntu-latest
    env:
      MAX: ${{ github.event.inputs.max_proposals || '2' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Run World Builder Agent
        run: node packages/cli/bin/world-builder.js --max $MAX

      - name: Score verse graph
        run: node packages/cli/bin/verse.js score

      - name: Commit and push .verse changes
        run: |
          git config user.name "World Builder Agent"
          git config user.email "world-builder[bot]@users.noreply.github.com"
          git add .verse/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat(world-builder): expand verse world [automated]"
            git push
          fi
